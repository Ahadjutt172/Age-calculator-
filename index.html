    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap-icons.min.css">

    <style>
        :root { 
            --bg: #060010; 
            --card-bg: rgba(15, 0, 30, 0.7); 
            --border: rgba(123, 0, 255, 0.2); 
            --accent-purple: #7b00ff; 
            --accent-violet: #c800ff;
            --text-white: #ffffff; 
            --text-secondary: #9ca3af; 
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-white); 
            font-family: 'Outfit', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(123, 0, 255, 0.15) 0%, transparent 40%), 
                radial-gradient(circle at 90% 80%, rgba(200, 0, 255, 0.1) 0%, transparent 40%); 
        }

        .container { width: 100%; max-width: 450px; }
        
        /* Header Section */
        .header { text-align: center; margin-bottom: 25px; }
        .logo-box { 
            width: 70px; height: 70px; margin: 0 auto 15px; 
            background: rgba(123, 0, 255, 0.1); 
            border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 30px rgba(123, 0, 255, 0.2); 
        }
        .logo-box i { font-size: 30px; color: var(--accent-purple); }

        h1 { font-size: 26px; font-weight: 800; color: var(--text-white); margin-bottom: 5px; letter-spacing: -0.5px; }
        .subtitle { font-size: 13px; color: var(--accent-purple); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }

        /* Card Styling */
        .card-nexus { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 28px; 
            backdrop-filter: blur(15px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        label { display: block; font-size: 14px; margin-bottom: 10px; color: var(--text-secondary); font-weight: 500; }

        /* Input Styling */
        input[type=date] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            color: white;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        input[type=date]:focus { border-color: var(--accent-purple); box-shadow: 0 0 15px rgba(123, 0, 255, 0.2); }

        /* Purple Nexus Button */
        .btn-nexus { 
            width: 100%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-violet));
            color: white; border: none; 
            font-weight: 700; padding: 15px; border-radius: 16px;
            transition: 0.3s; margin-top: 5px;
        }
        .btn-nexus:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(123, 0, 255, 0.4); }

        /* Stats Grid */
        .stats-container { margin-top: 25px; display: none; }
        
        .stat-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .stat-row:hover { background: rgba(123, 0, 255, 0.05); border-color: var(--accent-purple); }
        
        .stat-row i { width: 25px; color: var(--accent-purple); font-size: 16px; margin-right: 12px; }
        .stat-label { flex-grow: 1; font-size: 14px; color: var(--text-secondary); }
        .stat-value { font-weight: 700; color: var(--text-white); font-size: 15px; }

        hr { border: none; height: 1px; background: var(--border); margin: 20px 0; }

        .btn-share {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-share:hover { background: white; color: black; }

        .live-footer { text-align: center; margin-top: 15px; font-size: 11px; color: var(--accent-purple); font-weight: 600; letter-spacing: 0.5px; }
        
        /* Floating WhatsApp Button */
        .wa-float {
            position: fixed; bottom: 25px; right: 25px;
            width: 55px; height: 55px; background: #25D366;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 100;
            color: white; font-size: 24px; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-box"><i class="fas fa-ghost"></i></div>
            <h1>FTGM LIFE CALCULATOR</h1>
            <p class="subtitle">Life Stats Calculator</p>
        </div>

        <div class="card-nexus" id="shareCard">
            <label>Select Date of Birth</label>
            <input type="date" id="dob">
            <button class="btn-nexus" id="calcBtn">CALCULATE DATA</button>

            <div class="stats-container" id="stats">
                <div class="stat-row">
                    <i class="fas fa-cake-candles"></i>
                    <span class="stat-label">Current Age</span>
                    <span class="stat-value" id="age"></span>
                </div>
                <div class="stat-row">
                    <i class="fas fa-calendar-day"></i>
                    <span class="stat-label">Days Lived</span>
                    <span class="stat-value" id="days"></span>
                </div>
                <div class="stat-row">
                    <i class="fas fa-clock"></i>
                    <span class="stat-label">Hours Lived</span>
                    <span class="stat-value" id="hours"></span>
                </div>
                <div class="stat-row">
                    <i class="fas fa-stopwatch"></i>
                    <span class="stat-label">Seconds Lived</span>
                    <span class="stat-value" id="seconds"></span>
                </div>

                <hr>

                <div class="stat-row">
                    <i class="fas fa-bed"></i>
                    <span class="stat-label">Total Sleep</span>
                    <span class="stat-value" id="sleep"></span>
                </div>
                <div class="stat-row">
                    <i class="fas fa-heartbeat"></i>
                    <span class="stat-label">Heartbeats</span>
                    <span class="stat-value" id="heart"></span>
                </div>
                <div class="stat-row">
                    <i class="fas fa-wind"></i>
                    <span class="stat-label">Breaths</span>
                    <span class="stat-value" id="breath"></span>
                </div>
                <div class="stat-row">
                    <i class="fas fa-earth-americas"></i>
                    <span class="stat-label">Earth Rotations</span>
                    <span class="stat-value" id="earth"></span>
                </div>

                <button class="btn-share mt-3" onclick="shareImage()">
                    <i class="fas fa-camera me-2"></i> Take Screenshot
                </button>

                <div class="live-footer" id="liveTime"></div>
            </div>
        </div>
    </div>

    <a href="https://whatsapp.com/channel/0029Vb6eVps5kg73BCVOXP0O" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="js/html2canvas.min.js"></script>

    <script>
        let dob = null, interval = null;

        const age = document.getElementById("age");
        const days = document.getElementById("days");
        const hours = document.getElementById("hours");
        const seconds = document.getElementById("seconds");
        const sleep = document.getElementById("sleep");
        const heart = document.getElementById("heart");
        const breath = document.getElementById("breath");
        const earth = document.getElementById("earth");
        const liveTime = document.getElementById("liveTime");
        const stats = document.getElementById("stats");
        const dobInput = document.getElementById("dob");

        document.getElementById("calcBtn").onclick = () => {
            if (interval) clearInterval(interval);
            if (!dobInput.value) return alert("Please select your birthday");

            dob = new Date(dobInput.value);
            stats.style.display = "block";
            update();
            interval = setInterval(update, 1000);
        };

        function update() {
            const now = new Date();
            const diff = now - dob;

            const sec = Math.floor(diff / 1000);
            const min = Math.floor(sec / 60);
            const hr = Math.floor(min / 60);
            const day = Math.floor(hr / 24);
            const yr = (day / 365.2422).toFixed(2);

            age.innerText = yr + " Years";
            days.innerText = day.toLocaleString();
            hours.innerText = hr.toLocaleString();
            seconds.innerText = sec.toLocaleString();

            sleep.innerText = (day * 8).toLocaleString() + " Hrs";
            heart.innerText = (min * 72).toLocaleString();
            breath.innerText = (min * 16).toLocaleString();
            earth.innerText = day.toLocaleString();

            liveTime.innerText = "Syncing: " + now.toLocaleTimeString();
        }

        function shareImage() {
            html2canvas(document.getElementById("shareCard"), {
                backgroundColor: "#060010",
                scale: 2
            }).then(canvas => {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = "ftgm.png";
                link.click();
            });
        }
    </script>

</body></html>
